name: CI

# Integración continua: compila y ejecuta la batería de tests en cada push a main
# y en cada Pull Request. NO despliega (el deploy a producción se hace de forma
# supervisada; ver context/deploy-azure.md). Es la red de seguridad de los tests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DididaiApp.sln

      - name: Build
        run: dotnet build DididaiApp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test DididaiApp.sln --configuration Release --no-build --verbosity normal
